test_setup: TMA-Setup.yaml

tests:
  - name: G1-AgentDisabled
    description: Shop has Tax Matching Agent Enabled = false — no LLM call
    setup:
      shopSettings:
        taxMatchingAgentEnabled: false
        autoCreateTaxJurisdictions: false
        autoCreateTaxAreas: false
      orderAddress:
        countryRegionCode: US
        county: NY
        city: New York
      orderLines:
        - lineId: 10001
          taxLines:
            - lineNo: 1
              title: NEW YORK STATE TAX
              ratePct: 4.0
              channelLiable: false
    expected:
      orderUnchanged: true

  - name: G4-TaxAreaAlreadySet
    description: Tax Area Code already set by MapTaxArea — the agent skipped
    setup:
      shopSettings:
        taxMatchingAgentEnabled: true
      orderAddress:
        countryRegionCode: US
        county: NY
        city: New York
      existingTaxAreaCode: EXISTING-AREA
      orderLines:
        - lineId: 10001
          taxLines:
            - lineNo: 1
              title: NEW YORK STATE TAX
              ratePct: 4.0
              channelLiable: false
    expected:
      existingTaxAreaKept: EXISTING-AREA

  - name: G5-OrderTaxExempt
    description: Order is Tax Exempt — the agent skipped, order remains unchanged
    setup:
      shopSettings:
        taxMatchingAgentEnabled: true
      taxExempt: true
      orderAddress:
        countryRegionCode: US
        county: NY
        city: New York
      orderLines:
        - lineId: 10001
          taxLines:
            - lineNo: 1
              title: NEW YORK STATE TAX
              ratePct: 4.0
              channelLiable: false
    expected:
      orderUnchanged: true

  - name: G6-NoOrderLines
    description: Order has no order lines — matcher returns false, no changes
    setup:
      shopSettings:
        taxMatchingAgentEnabled: true
      orderAddress:
        countryRegionCode: US
        county: NY
        city: New York
    expected:
      orderUnchanged: true

  - name: G7-ResultFalse
    description: Order import Result = false — event subscriber exits immediately
    setup:
      shopSettings:
        taxMatchingAgentEnabled: true
      resultFalse: true
      orderAddress:
        countryRegionCode: US
        county: NY
        city: New York
      orderLines:
        - lineId: 10001
          taxLines:
            - lineNo: 1
              title: NEW YORK STATE TAX
              ratePct: 4.0
              channelLiable: false
    expected:
      orderUnchanged: true
