          Description: Canada HST
        - Code: CAGST
          Description: Canada GST
        - Code: CAPST
          Description: Canada PST
        - Code: BCPST
          Description: British Columbia PST
      orderAddress:
        countryRegionCode: CA
        county: ON
        city: Toronto
      orderLines:
        - lineId: 10001
          taxLines:
            - lineNo: 1
              title: HST
              ratePct: 13.0
              channelLiable: false
    expected:
      taxLineJurisdictions:
        - parentId: 10001
          lineNo: 1
          jurisdictionCode: CAHST
      matchResult: true

