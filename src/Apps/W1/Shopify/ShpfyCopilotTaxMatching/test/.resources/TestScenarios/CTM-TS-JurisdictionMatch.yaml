          taxLines:
            - lineNo: 1
              title: LOS ANGELES COUNTY TAX
              ratePct: 1.0
              channelLiable: false
            - lineNo: 2
              title: CALIFORNIA STATE TAX
              ratePct: 6.0
              channelLiable: false
    expected:
      taxLineJurisdictions:
        - parentId: 10001
          lineNo: 1
          jurisdictionCode: LACOTX
        - parentId: 10001
          lineNo: 2
