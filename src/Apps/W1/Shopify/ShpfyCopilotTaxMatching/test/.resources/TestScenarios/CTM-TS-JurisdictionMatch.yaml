              title: WATERLOO LOCAL TAX
              ratePct: 1.0
              channelLiable: false
    expected:
      taxLineJurisdictions:
        - parentId: 10001
          lineNo: 1
          jurisdictionCode: IASTAX
        - parentId: 10001
          lineNo: 2
          jurisdictionCode: IACTAX
      matchResult: true

