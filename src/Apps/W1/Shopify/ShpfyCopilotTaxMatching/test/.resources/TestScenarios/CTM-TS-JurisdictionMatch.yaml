  - name: H9-FiveTaxLinesMixedDifficulty
    description: Large order with 5 tax lines — some trivial, others require semantic reasoning
    setup:
      shopSettings:
        autoCreateTaxJurisdictions: false
      taxJurisdictions:
        - Code: TXSTAX
          Description: Texas State Sales Tax
        - Code: TXHTAX
          Description: Houston City Sales Tax
        - Code: TXHCTX
          Description: Harris County Tax
        - Code: TXMTD
          Description: Houston Metro Transit
        - Code: TXESD
          Description: Emergency Services District
      orderAddress:
        countryRegionCode: US
        county: TX
        city: Houston
      orderLines:
        - lineId: 10001
          taxLines:
            - lineNo: 1
              title: TEXAS STATE SALES TAX
              ratePct: 6.25
              channelLiable: false
            - lineNo: 2
              title: CITY OF HOUSTON TAX
              ratePct: 1.0
              channelLiable: false
            - lineNo: 3
              title: HARRIS CO TAX
              ratePct: 0.5
              channelLiable: false
            - lineNo: 4
              title: METRO TRANSIT AUTHORITY
              ratePct: 1.0
              channelLiable: false
            - lineNo: 5
              title: "ESD #1"
              ratePct: 0.1
              channelLiable: false
    expected:
      allTaxLinesMatched: true
      matchResult: true

  - name: H10-MisleadingJurisdictionCode
    description: 'WATAX code looks like "WATERLOO" but is Washington — LLM must not be fooled'
    setup:
      shopSettings:
        autoCreateTaxJurisdictions: false
      taxJurisdictions:
