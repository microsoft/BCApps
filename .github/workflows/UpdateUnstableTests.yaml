name: Update Unstable Tests List
run-name: "Detect unstable tests from the last ${{ inputs.runLimit || 3 }} CI/CD runs across official branches"

# Automatically detects unstable tests by analyzing recent CI/CD run results.
#
# Runs twice daily on a schedule and can be triggered manually with configurable filters.
# For each official branch (main, releases/*), the workflow:
#   1. Fetches the last 3 completed CI/CD runs (filtered by selected event types).
#   2. Downloads all test result artifacts from those runs.
#   3. Identifies tests that failed in at least one run → marks them as unstable.
#   4. Publishes an updated unstable-tests artifact per branch.
#
# PR builds consume this artifact to tolerate known-unstable test failures, preventing
# unstable tests from blocking unrelated pull requests.
#
# The list is self-healing: tests that pass consistently across all examined runs are
# automatically removed from the unstable list.

on:
  workflow_dispatch:
    inputs:
      runLimit:
        description: 'Number of recent CI/CD runs to examine'
        required: false
        type: number
        default: 3
      filterPush:
        description: 'Include runs triggered by push'
        required: false
        type: boolean
        default: false
      filterWorkflowDispatch:
        description: 'Include runs triggered by workflow_dispatch'
        required: false
        type: boolean
        default: true
  schedule:
    - cron: '0 10,22 * * *'  # Twice daily at 10:00 and 22:00 UTC

permissions: read-all

jobs:
  GetBranches:
    name: Get Official Branches
    if: github.repository_owner == 'microsoft'
    runs-on: ubuntu-latest
    outputs:
      updateBranches: ${{ steps.ensureArray.outputs.branchesJson }}
    steps:
      - name: Get Official Branches
        id: getOfficialBranches
        uses: microsoft/BCApps/.github/actions/GetGitBranches@main
        with:
          include: "['main', 'releases/*']"

      - name: Ensure JSON array
        id: ensureArray
        shell: pwsh
        run: |
          # PowerShell's ConvertTo-Json emits a bare string for single-element arrays.
          # Wrap it in an array if needed so the matrix strategy always receives a JSON array.
          $raw = '${{ steps.getOfficialBranches.outputs.branchesJson }}'
          $parsed = $raw | ConvertFrom-Json
          if ($parsed -is [string]) { $parsed = @($parsed) }
          $json = ConvertTo-Json @($parsed) -Compress
          Write-Host "Branches: $json"
          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "branchesJson=$json"

  UpdateUnstableTests:
    name: "[${{ matrix.branch }}] Update Unstable Tests"
    if: github.repository_owner == 'microsoft'
    runs-on: windows-latest
    needs: GetBranches
    strategy:
      matrix:
        branch: ${{ fromJson(needs.GetBranches.outputs.updateBranches) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Calculate run IDs
        id: calc
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          _branch: ${{ matrix.branch }}
          _repository: ${{ github.repository }}
          _runLimit: ${{ inputs.runLimit || 3 }}
          _filterPush: ${{ inputs.filterPush || false }}
          _filterWorkflowDispatch: ${{ inputs.filterWorkflowDispatch || true }}
        run: |
          # Discover the recent window of completed runs that produced test result artifacts.
          Import-Module ./eng/AL-Go/scripts/TestTolerance/TestTolerance.psm1 -Force
          $runIds = Find-UnstableTestRunIds `
            -Branch $env:_branch `
            -Repository $env:_repository `
            -RunLimit ([int]$env:_runLimit) `
            -FilterPush:($env:_filterPush -eq 'true') `
            -FilterWorkflowDispatch:($env:_filterWorkflowDispatch -eq 'true')
          $csv = ($runIds -join ',')
          Write-Host "Run IDs: $csv"
          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "runIds=$csv"

      - name: Update unstable tests
        if: steps.calc.outputs.runIds != ''
        uses: microsoft/BCApps/.github/actions/UpdateUnstableTests@main
        with:
          branch: ${{ matrix.branch }}
          run-id: ${{ steps.calc.outputs.runIds }}
