name: Detect Unstable Tests From PR Builds
run-name: "Detect tests failing across multiple PRs in the last ${{ inputs.windowHours || 3 }}h"

# Detects unstable tests by correlating failures across recent PR builds.
#
# A test failing on a single PR is ambiguous (it could be that PR's own change), but the same test
# failing across several unrelated PRs in a short window is almost never caused by any one PR — it is
# an instability. For each official branch (main, releases/*), this workflow:
#   1. Lists Pull Request Build runs completed in the last few hours that target the branch.
#   2. Downloads their test result artifacts and identifies failing tests.
#   3. Marks any test that failed on >= minDistinctPrs distinct PRs as unstable (additive merge into
#      the existing per-branch unstable-tests artifact; every existing entry is preserved).
#
# This is a fast additive complement to the scheduled UpdateUnstableTests workflow: it reacts within
# minutes instead of waiting for the twice-daily CI/CD-based recompute. Entries it adds are subject to
# the usual self-healing — the scheduled recompute may drop them if they stop failing in CI/CD, and the
# next detector run re-adds them if they keep recurring across PRs.

on:
  workflow_dispatch:
    inputs:
      windowHours:
        description: 'How many hours of recent PR builds to examine'
        required: false
        type: number
        default: 3
      minDistinctPrs:
        description: 'Minimum number of distinct PRs a test must fail on to be marked unstable'
        required: false
        type: number
        default: 2
  schedule:
    - cron: '15 * * * *'  # Hourly, at minute 15

permissions: read-all

jobs:
  GetBranches:
    name: Get Official Branches
    if: github.repository_owner == 'microsoft'
    runs-on: ubuntu-latest
    outputs:
      updateBranches: ${{ steps.ensureArray.outputs.branchesJson }}
    steps:
      - name: Get Official Branches
        id: getOfficialBranches
        uses: microsoft/BCApps/.github/actions/GetGitBranches@main
        with:
          include: "['main', 'releases/*']"

      - name: Ensure JSON array
        id: ensureArray
        shell: pwsh
        run: |
          $raw = '${{ steps.getOfficialBranches.outputs.branchesJson }}'
          $parsed = @($raw | ConvertFrom-Json)
          # The leading unary comma forces array context so a single branch still serializes
          # as a JSON array (e.g. ["main"]) and the downstream matrix always receives valid JSON.
          $json = ,@($parsed) | ConvertTo-Json -Compress
          Write-Host "Branches: $json"
          Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "branchesJson=$json"

  DetectFromPrBuilds:
    name: "[${{ matrix.branch }}] Detect Cross-PR Unstable Tests"
    if: github.repository_owner == 'microsoft' && needs.GetBranches.outputs.updateBranches != '[]' && needs.GetBranches.outputs.updateBranches != ''
    runs-on: windows-latest
    needs: GetBranches
    environment: Official-Build
    strategy:
      matrix:
        branch: ${{ fromJson(needs.GetBranches.outputs.updateBranches) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect and update unstable tests
        id: detect
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          _branch: ${{ matrix.branch }}
          _windowHours: ${{ inputs.windowHours || 3 }}
          _minDistinctPrs: ${{ inputs.minDistinctPrs || 2 }}
        run: |
          Import-Module ./build/scripts/TestTolerance/TestTolerance.psm1 -Force
          $outputPath = Join-Path '.unstable-tests' 'unstable-tests.json'
          ./build/scripts/TestTolerance/UpdateUnstableTestsFromPrBuilds.ps1 `
            -Branch $env:_branch `
            -WindowHours ([int]$env:_windowHours) `
            -MinDistinctPrs ([int]$env:_minDistinctPrs) `
            -OutputPath $outputPath

          # Expose the artifact name only when the file was produced, so the upload step is skipped
          # when nothing new was detected.
          if (Test-Path $outputPath) {
            $artifactName = Get-UnstableTestsArtifactName -Branch $env:_branch
            Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT -Value "artifactName=$artifactName"
          }

      - name: Upload unstable tests artifact
        if: steps.detect.outputs.artifactName != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        env:
          ACTIONS_RUNNER_DISABLE_NODE_MAGLEV: 1
        with:
          name: ${{ steps.detect.outputs.artifactName }}
          path: .unstable-tests/unstable-tests.json
          if-no-files-found: warn
          retention-days: 30
