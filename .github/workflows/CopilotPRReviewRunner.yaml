name: Copilot PR Review Runner

on:
  workflow_run:
    workflows:
      - Copilot PR Review
    types:
      - completed

concurrency:
  group: copilot-pr-review-runner-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    environment: copilot-pr-review
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: copilot-pr-review-input-*
          path: ${{ runner.temp }}/copilot-pr-review-input
          merge-multiple: true

      - name: Resolve PR details
        id: pr
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Accept = 'application/vnd.github+json'
            Authorization = "Bearer $env:GITHUB_TOKEN"
            'User-Agent' = 'bcapps-copilot-pr-reviewer'
          }

          $expectedHeadSha = '${{ github.event.workflow_run.head_sha }}'

          $prNumber = $null
          $resolvedHeadSha = $null
          $resolvedBaseRef = $null

          # Primary source: metadata artifact produced by the intake workflow run.
          try {
            $artifactDir = Join-Path $env:RUNNER_TEMP 'copilot-pr-review-input'
            $metadataFile = Get-ChildItem -Path $artifactDir -Filter 'pr-metadata.json' -Recurse -File | Select-Object -First 1
            if ($metadataFile) {
              $metadata = Get-Content -Path $metadataFile.FullName -Raw | ConvertFrom-Json
              if ($metadata.prNumber) { $prNumber = [string]$metadata.prNumber }
              if ($metadata.headSha) { $resolvedHeadSha = [string]$metadata.headSha }
              if ($metadata.baseRef) { $resolvedBaseRef = [string]$metadata.baseRef }
              Write-Host "Resolved PR metadata from artifact file $($metadataFile.FullName)."
            }
          }
          catch {
            Write-Warning "Failed to resolve PR metadata from artifact: $($_.Exception.Message)"
          }

          if (-not $prNumber) {
            throw 'No pull request number found in artifact metadata.'
          }

          $uri = "https://api.github.com/repos/${{ github.repository }}/pulls/$prNumber"
          $pr = Invoke-RestMethod -Uri $uri -Headers $headers -Method GET

          if (-not $resolvedHeadSha) { $resolvedHeadSha = [string]$pr.head.sha }
          if (-not $resolvedBaseRef) { $resolvedBaseRef = [string]$pr.base.ref }

          if ($expectedHeadSha -and $resolvedHeadSha -ne $expectedHeadSha) {
            throw 'Resolved PR head SHA does not match workflow_run head SHA.'
          }

          "number=$([string]$pr.number)" >> $env:GITHUB_OUTPUT
          "head_sha=$resolvedHeadSha" >> $env:GITHUB_OUTPUT
          "base_ref=$resolvedBaseRef" >> $env:GITHUB_OUTPUT

      - name: Checkout trusted base code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/heads/main
          path: trusted
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Copilot CLI
        run: npm install --global @github/copilot

      - name: Run Copilot PR review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ secrets.COPILOT_GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REVIEW_WORKSPACE: ${{ github.workspace }}/trusted
          REVIEW_OUTPUT_DIR: ${{ github.workspace }}/review-output
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          COPILOT_MODEL: ${{ vars.COPILOT_REVIEW_MODEL }}
          MINIMUM_SEVERITY: ${{ vars.COPILOT_REVIEW_MINIMUM_SEVERITY || 'Medium' }}
          MAX_FINDINGS_PER_DOMAIN: ${{ vars.COPILOT_REVIEW_MAX_FINDINGS_PER_DOMAIN || '25' }}
          COPILOT_REVIEW_FAIL_ON_PARSE_ERROR: ${{ vars.COPILOT_REVIEW_FAIL_ON_PARSE_ERROR || 'true' }}
          COPILOT_REVIEW_EMBED_DIFF: ${{ vars.COPILOT_REVIEW_EMBED_DIFF || 'false' }}
          COPILOT_REVIEW_CLI_TIMEOUT_MINUTES: ${{ vars.COPILOT_REVIEW_CLI_TIMEOUT_MINUTES || '30' }}
          COPILOT_REVIEW_AGENT_LABEL: ${{ vars.COPILOT_REVIEW_AGENT_LABEL || 'copilot-pr-review' }}
          COPILOT_REVIEW_AGENT_RELEASE_DATE: ${{ vars.COPILOT_REVIEW_AGENT_RELEASE_DATE }}
          COPILOT_REVIEW_AGENT_RELEASE_VERSION: ${{ vars.COPILOT_REVIEW_AGENT_RELEASE_VERSION || '0' }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_ref }}
        run: |
          & "${{ github.workspace }}/trusted/tools/Code Review/scripts/Invoke-CopilotPRReview.ps1"

      - name: Upload review artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: copilot-pr-review-output-${{ steps.pr.outputs.number }}
          path: ${{ github.workspace }}/review-output
          if-no-files-found: warn
