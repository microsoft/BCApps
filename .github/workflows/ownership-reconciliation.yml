name: Team Ownership Reconciliation

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      subject_kind:
        description: Open subject kind to scan
        required: true
        type: choice
        options:
          - issue
          - pull_request
        default: issue
      max_items:
        description: Maximum subjects in this batch (1-100)
        required: true
        type: number
        default: 25
      cursor:
        description: Optional continuation cursor from an earlier manual run
        required: false
        type: string
      dry_run:
        description: Classify and report without writing labels
        required: true
        type: boolean
        default: true

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: ownership-reconciliation
  cancel-in-progress: false

jobs:
  inventory:
    name: Build bounded reconciliation batch
    if: github.repository == 'microsoft/BCApps'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.batch.outputs.matrix }}
      has_items: ${{ steps.batch.outputs.has_items }}
      next_kind: ${{ steps.batch.outputs.next_kind }}
      next_cursor: ${{ steps.batch.outputs.next_cursor }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout trusted default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Locate latest scheduled checkpoint
        if: github.event_name == 'schedule'
        id: checkpoint
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $response = gh api "repos/$env:REPOSITORY/actions/artifacts?name=ownership-reconciliation-state&per_page=1" |
            ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to locate the latest ownership reconciliation checkpoint.'
          }
          $artifact = @($response.artifacts | Select-Object -First 1)
          if ($artifact.Count -eq 1 -and -not $artifact[0].expired) {
            "run_id=$($artifact[0].workflow_run.id)" | Add-Content -Encoding UTF8 -Path $env:GITHUB_OUTPUT
          }

      - name: Restore scheduled checkpoint
        if: github.event_name == 'schedule' && steps.checkpoint.outputs.run_id != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ownership-reconciliation-state
          path: ownership-state
          github-token: ${{ github.token }}
          run-id: ${{ steps.checkpoint.outputs.run_id }}

      - name: Build reconciliation batch
        id: batch
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SUBJECT_KIND: ${{ github.event_name == 'schedule' && 'issue' || inputs.subject_kind }}
          LIMIT: ${{ github.event_name == 'schedule' && 25 || inputs.max_items }}
          CURSOR: ${{ github.event_name == 'schedule' && '' || inputs.cursor }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          SCHEDULED: ${{ github.event_name == 'schedule' }}
        run: |
          $parameters = @{
            Repository = $env:REPOSITORY
            SubjectKind = $env:SUBJECT_KIND
            Limit = [int]$env:LIMIT
            Cursor = $env:CURSOR
            StatePath = 'ownership-state/state.json'
          }
          if ($env:SCHEDULED -eq 'true') {
            $parameters.Scheduled = $true
          }
          if ($env:DRY_RUN -eq 'true') {
            $parameters.DryRun = $true
          }
          ./build/scripts/TeamOwnership/Get-OwnershipReconciliationBatch.ps1 @parameters

      - name: Save scheduled checkpoint
        if: success() && github.event_name == 'schedule'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ownership-reconciliation-state
          path: ownership-state/state.json
          retention-days: 30
          if-no-files-found: error

  reconcile:
    name: "Reconcile ${{ matrix.subject.kind }} #${{ matrix.subject.number }}"
    needs: inventory
    if: needs.inventory.outputs.has_items == 'true'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        subject: ${{ fromJSON(needs.inventory.outputs.matrix) }}
    uses: ./.github/workflows/_ownership-classification.yml
    with:
      subject_kind: ${{ matrix.subject.kind }}
      subject_number: ${{ matrix.subject.number }}
      mode: classify
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets: inherit
