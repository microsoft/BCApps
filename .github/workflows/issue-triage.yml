name: Issue Triage Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write  # needed to push triage reports to the wiki
  issues: write

concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.event.label.name == 'ai-triage' && github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Install dependencies
        working-directory: .github/scripts/triage
        run: npm ci

      - name: Run triage agent
        working-directory: .github/scripts/triage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          TRIAGE_POST_RESULTS: ${{ vars.TRIAGE_POST_RESULTS || 'true' }}
        run: node index.js
