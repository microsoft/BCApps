name: 'Validate Country Projects'

# Validates that country project configurations are up to date:
# 1. CountrySpecificApps.txt matches current country apps on disk
# 2. Country settings.json files have correct W1 app dependencies

on:
  push:
    branches: [ "main", "releases/*" ]
    paths:
      - "src/Apps/**/app.json"
      - "build/projects.json"
      - "build/projects/Apps */.AL-Go/settings.json"
      - "build/projects/Test Apps/.AL-Go/CountrySpecificApps.txt"
      - "build/scripts/CountryProjectSetup/**"
      - ".github/workflows/ValidateCountryProjects.yaml"
  pull_request:
    branches: [ "main", "releases/*" ]
    paths:
      - "src/Apps/**/app.json"
      - "build/projects.json"
      - "build/projects/Apps */.AL-Go/settings.json"
      - "build/projects/Test Apps/.AL-Go/CountrySpecificApps.txt"
      - "build/scripts/CountryProjectSetup/**"
      - ".github/workflows/ValidateCountryProjects.yaml"

permissions:
  contents: read

jobs:
  ValidateCountryApps:
    name: Validate Country Apps List
    runs-on: windows-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Validate CountrySpecificApps.txt
        shell: pwsh
        run: |
          $result = & "${{ github.workspace }}/build/scripts/CountryProjectSetup/GenerateCountryAppsList.ps1" -Validate
          if ($result -eq $false) {
            Write-Host "::error::CountrySpecificApps.txt is out of date. Run 'build/scripts/CountryProjectSetup/GenerateCountryAppsList.ps1' and commit the changes."
            exit 1
          }

  ValidateCountrySettings:
    name: Validate Country Settings
    runs-on: windows-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Validate Country Project Settings
        shell: pwsh
        run: |
          $result = & "${{ github.workspace }}/build/scripts/CountryProjectSetup/Update-CountryProjectSettings.ps1" -Validate
          if ($result -eq $false) {
            Write-Host "::error::Country project settings are out of date. Run 'build/scripts/CountryProjectSetup/Update-CountryProjectSettings.ps1' and commit the changes."
            exit 1
          }
