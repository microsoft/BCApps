name: 'Run Copilot'

on:
  workflow_dispatch:
    inputs:
      instructions:
        description: Instructions to pass to Copilot CLI
        type: string
        required: true

permissions:
  contents: read
  copilot-requests: write

jobs:
  RunCopilot:
    runs-on: [ GitHub-BCAppsSwec ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot
        env:
          COPILOT_GITHUB_TOKEN: ${{ github.token }}
        run: copilot -p "${{ inputs.instructions }}" --no-ask-user
