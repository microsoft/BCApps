name: Team Ownership Classification

on:
  issues:
    types: [opened, reopened, edited, labeled, unlabeled]
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      subject_kind:
        description: issue or pull_request
        required: true
        type: choice
        options:
          - issue
          - pull_request
      subject_number:
        description: Issue or pull request number
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: >-
    ownership-${{
      github.event_name == 'workflow_dispatch' && inputs.subject_kind ||
      github.event_name == 'issues' && 'issue' ||
      'pull_request'
    }}-${{
      github.event_name == 'workflow_dispatch' && inputs.subject_number ||
      github.event_name == 'issues' && github.event.issue.number ||
      github.event.pull_request.number
    }}
  cancel-in-progress: false
  queue: max

env:
  AGENT_REPO: microsoft/BCAppsTriage
  AGENT_REPO_NAME: BCAppsTriage
  AGENT_REF: main
  AGENT_WORKFLOW: ownership-classification.yml
  SUBJECT_KIND: >-
    ${{
      github.event_name == 'workflow_dispatch' && inputs.subject_kind ||
      github.event_name == 'issues' && 'issue' ||
      'pull_request'
    }}
  SUBJECT_NUMBER: >-
    ${{
      github.event_name == 'workflow_dispatch' && inputs.subject_number ||
      github.event_name == 'issues' && github.event.issue.number ||
      github.event.pull_request.number
    }}

jobs:
  classify:
    name: Classify team ownership
    if: >-
      github.repository == 'microsoft/BCApps' && (
        (
          github.event_name == 'workflow_dispatch' &&
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        ) ||
        (
          github.event_name == 'issues' &&
          github.event.issue.state == 'open' && (
            contains(fromJSON('["opened","reopened","edited"]'), github.event.action) ||
            (
              contains(fromJSON('["labeled","unlabeled"]'), github.event.action) &&
              (
                github.event.label.name == 'Ownership: Manual' ||
                contains(fromJSON('["Finance","SCM","Integration","Other"]'), github.event.label.name)
              )
            )
          )
        ) ||
        (
          github.event_name == 'pull_request_target' &&
          github.event.pull_request.state == 'open' && (
            contains(fromJSON('["opened","reopened","edited","synchronize","ready_for_review"]'), github.event.action) ||
            (
              contains(fromJSON('["labeled","unlabeled"]'), github.event.action) &&
              (
                github.event.label.name == 'Ownership: Manual' ||
                contains(fromJSON('["Finance","SCM","Integration","Other"]'), github.event.label.name)
              )
            )
          )
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: triage
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check labels and manual override
        id: preflight
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          SUBJECT_KIND: ${{ env.SUBJECT_KIND }}
          SUBJECT_NUMBER: ${{ env.SUBJECT_NUMBER }}
        with:
          script: |
            const required = [
              'Finance', 'SCM', 'Integration', 'Other',
              'Ownership: Manual', 'Ownership: Needs Review',
            ];
            const teams = required.slice(0, 4);
            const subjectKind = process.env.SUBJECT_KIND;
            const issue_number = Number(process.env.SUBJECT_NUMBER);
            const action = context.payload.action;
            const changedLabel = context.payload.label?.name;
            const subject = context.payload.issue || context.payload.pull_request;
            const currentLabels = (subject?.labels || []).map(label =>
              typeof label === 'string' ? label : label.name
            );
            const mode = context.eventName === 'workflow_dispatch'
              ? 'classify'
              : action === 'labeled' && changedLabel === 'Ownership: Manual'
                ? 'audit'
                : ['labeled', 'unlabeled'].includes(action) &&
                    changedLabel !== 'Ownership: Manual' &&
                    currentLabels.includes('Ownership: Manual')
                  ? 'audit'
                  : 'classify';
            if (!Number.isSafeInteger(issue_number) || issue_number <= 0) {
              throw new Error('subject_number must be a positive integer');
            }
            if (!['issue', 'pull_request'].includes(subjectKind)) {
              throw new Error(`Unsupported subject kind: ${subjectKind}`);
            }
            if (!['classify', 'audit'].includes(mode)) {
              throw new Error(`Unsupported ownership mode: ${mode}`);
            }

            const response = await github.rest.issues.get({
              ...context.repo, issue_number,
            });
            const actualKind = response.data.pull_request ? 'pull_request' : 'issue';
            if (actualKind !== subjectKind) {
              throw new Error(`#${issue_number} is ${actualKind}, not ${subjectKind}`);
            }
            if (response.data.state !== 'open') {
              throw new Error(`${subjectKind} #${issue_number} is not open`);
            }

            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              ...context.repo, per_page: 100,
            });
            const available = new Set(repoLabels.map(label => label.name));
            const missing = required.filter(name => !available.has(name));
            if (missing.length) {
              throw new Error(`Provision required ownership labels before running automation: ${missing.join(', ')}`);
            }

            const getLabels = async () => (await github.paginate(
              github.rest.issues.listLabelsOnIssue,
              { ...context.repo, issue_number, per_page: 100 },
            )).map(label => label.name);
            const labels = await getLabels();
            const selected = teams.filter(team => labels.includes(team));
            const manual = labels.includes('Ownership: Manual');

            if (manual) {
              core.setOutput('dispatch', 'false');
              if (selected.length === 1) {
                await core.summary.addHeading('Manual ownership override')
                  .addRaw(`Preserving **${selected[0]}**; automated classification was skipped.`)
                  .write();
                return;
              }
              if (!labels.includes('Ownership: Needs Review')) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number, labels: ['Ownership: Needs Review'],
                });
              }
              await core.summary.addHeading('Invalid manual ownership override')
                .addRaw(`Expected exactly one team label; found **${selected.length}**. Team labels were preserved.`)
                .write();
              throw new Error('Ownership: Manual requires exactly one team label');
            }

            if (mode !== 'classify') {
              core.setOutput('dispatch', 'false');
              core.info('No manual override is present; this label event requires no action.');
              return;
            }
            core.setOutput('dispatch', 'true');

      - name: Create correlation token
        if: steps.preflight.outputs.dispatch == 'true'
        id: correlation
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: core.setOutput('token', require('crypto').randomUUID())

      - name: Mint token for BCAppsTriage
        if: steps.preflight.outputs.dispatch == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.TRIAGE_APP_ID }}
          private-key: ${{ secrets.TRIAGE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ env.AGENT_REPO_NAME }}

      - name: Dispatch ownership producer
        if: steps.preflight.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SUBJECT_KIND: ${{ env.SUBJECT_KIND }}
          SUBJECT_NUMBER: ${{ env.SUBJECT_NUMBER }}
          CORRELATION_TOKEN: ${{ steps.correlation.outputs.token }}
        run: |
          set -euo pipefail
          gh workflow run "$AGENT_WORKFLOW" --repo "$AGENT_REPO" --ref "$AGENT_REF" \
            -f repository="$GITHUB_REPOSITORY" \
            -f subject_kind="$SUBJECT_KIND" \
            -f subject_number="$SUBJECT_NUMBER" \
            -f correlation_token="$CORRELATION_TOKEN"

      - name: Await successful producer run
        if: steps.preflight.outputs.dispatch == 'true'
        id: await
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CORRELATION_TOKEN: ${{ steps.correlation.outputs.token }}
        run: |
          set -euo pipefail
          marker="[$CORRELATION_TOKEN]"
          run_id=""
          for _ in $(seq 1 30); do
            run_id=$(gh run list --repo "$AGENT_REPO" --workflow "$AGENT_WORKFLOW" \
              --event workflow_dispatch --limit 100 --json databaseId,displayTitle \
              --jq ".[] | select(.displayTitle | contains(\"$marker\")) | .databaseId" |
              head -n 1) || true
            if [ -n "$run_id" ]; then break; fi
            sleep 10
          done
          if [ -z "$run_id" ]; then
            echo "::error::Timed out waiting for the correlated ownership producer run."
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --repo "$AGENT_REPO" --interval 15 --exit-status
          conclusion=$(gh run view "$run_id" --repo "$AGENT_REPO" --json conclusion --jq .conclusion)
          test "$conclusion" = "success"

      - name: Download ownership result
        if: steps.preflight.outputs.dispatch == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ steps.await.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir result
          gh run download "$RUN_ID" --repo "$AGENT_REPO" \
            --name ownership-result --dir result
          test -f result/ownership-result.json

      - name: Validate and apply ownership result
        if: steps.preflight.outputs.dispatch == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RESULT_PATH: result/ownership-result.json
          CORRELATION_TOKEN: ${{ steps.correlation.outputs.token }}
          SUBJECT_KIND: ${{ env.SUBJECT_KIND }}
          SUBJECT_NUMBER: ${{ env.SUBJECT_NUMBER }}
        with:
          script: |
            const fs = require('fs');
            const { TextDecoder } = require('util');
            const required = [
              'Finance', 'SCM', 'Integration', 'Other',
              'Ownership: Manual', 'Ownership: Needs Review',
            ];
            const teams = required.slice(0, 4);
            const confidenceValues = ['high', 'medium', 'low'];
            const sources = [
              'issue:path', 'issue:localization', 'issue:title-object',
              'issue:title-phrase', 'issue:app-area', 'issue:body-object',
              'issue:unresolved', 'pull_request:changed-files',
              'pull_request:ambiguous', 'pull_request:unresolved',
              'pull_request:incomplete-files',
            ];
            const issue_number = Number(process.env.SUBJECT_NUMBER);
            const bytes = fs.readFileSync(process.env.RESULT_PATH);
            if (bytes.length > 67108864) {
              throw new Error('ownership-result.json exceeds 67,108,864 UTF-8 bytes');
            }
            let result;
            try {
              result = JSON.parse(new TextDecoder('utf-8', { fatal: true }).decode(bytes));
            } catch (error) {
              throw new Error(`ownership-result.json is not valid UTF-8 JSON: ${error.message}`);
            }
            const object = value => value && typeof value === 'object' && !Array.isArray(value);
            if (!object(result) || !object(result.subject) || !object(result.ownership)) {
              throw new Error('ownership-result.json must contain the v1 result object');
            }
            const reason = result.ownership.reason;
            if (
              result.schemaVersion !== 1 ||
              result.correlationToken !== process.env.CORRELATION_TOKEN ||
              result.subject.repository !== context.payload.repository.full_name ||
              result.subject.kind !== process.env.SUBJECT_KIND ||
              result.subject.number !== issue_number ||
              !Number.isSafeInteger(result.subject.number) ||
              !teams.includes(result.ownership.team) ||
              !confidenceValues.includes(result.ownership.confidence) ||
              !sources.includes(result.ownership.source) ||
              typeof reason !== 'string' ||
              reason.length === 0 ||
              reason.length > 1000 ||
              reason.trim().length === 0 ||
              /[\u0000-\u001F\u007F]/.test(reason)
            ) {
              throw new Error('ownership-result.json failed consumed-field validation');
            }

            const repoLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              ...context.repo, per_page: 100,
            });
            const available = new Set(repoLabels.map(label => label.name));
            const missing = required.filter(name => !available.has(name));
            if (missing.length) {
              throw new Error(`Required ownership labels disappeared: ${missing.join(', ')}`);
            }

            const getLabels = async () => (await github.paginate(
              github.rest.issues.listLabelsOnIssue,
              { ...context.repo, issue_number, per_page: 100 },
            )).map(label => label.name);
            const auditOverride = async labels => {
              if (!labels.includes('Ownership: Manual')) return false;
              const selected = teams.filter(team => labels.includes(team));
              if (selected.length === 1) {
                core.info(`Manual override appeared; preserving ${selected[0]}.`);
                return true;
              }
              if (!labels.includes('Ownership: Needs Review')) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number, labels: ['Ownership: Needs Review'],
                });
              }
              throw new Error(`Manual override appeared with ${selected.length} team labels; teams were preserved`);
            };

            let labels = await getLabels();
            if (await auditOverride(labels)) return;
            const team = result.ownership.team;
            const needsReview = team === 'Other' || result.ownership.confidence === 'low';
            const originalTeams = teams.filter(name => labels.includes(name));
            const originalNeedsReview = labels.includes('Ownership: Needs Review');
            const rollbackForOverride = async () => {
              let current = await getLabels();
              if (!current.includes('Ownership: Manual')) return false;

              const restore = originalTeams.filter(name => !current.includes(name));
              if (originalNeedsReview && !current.includes('Ownership: Needs Review')) {
                restore.push('Ownership: Needs Review');
              }
              if (restore.length) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number, labels: restore,
                });
              }
              current = await getLabels();
              if (!originalTeams.includes(team) && current.includes(team)) {
                try {
                  await github.rest.issues.removeLabel({
                    ...context.repo, issue_number, name: team,
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
              if (!originalNeedsReview && current.includes('Ownership: Needs Review')) {
                try {
                  await github.rest.issues.removeLabel({
                    ...context.repo, issue_number, name: 'Ownership: Needs Review',
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }

              current = await getLabels();
              const selected = teams.filter(name => current.includes(name));
              if (selected.length !== 1) {
                if (!current.includes('Ownership: Needs Review')) {
                  await github.rest.issues.addLabels({
                    ...context.repo, issue_number, labels: ['Ownership: Needs Review'],
                  });
                }
                throw new Error(
                  `Manual override appeared during mutation with ${selected.length} team labels; pre-mutation teams were restored`,
                );
              }
              core.warning(`Manual override appeared during mutation; restored and preserved ${selected[0]}.`);
              return true;
            };
            const safeReason = reason.replace(/[\r\n|]+/g, ' ').trim();
            await core.summary.addHeading('Ownership decision').addTable([
              [{ data: 'Field', header: true }, { data: 'Value', header: true }],
              ['Subject', `${process.env.SUBJECT_KIND} #${issue_number}`],
              ['Team', team],
              ['Source', result.ownership.source],
              ['Confidence', result.ownership.confidence],
              ['Reason', safeReason],
            ]).write();
            for (let attempt = 1; attempt <= 3; attempt++) {
              labels = await getLabels();
              if (await auditOverride(labels)) return;
              const additions = [];
              if (!labels.includes(team)) additions.push(team);
              if (needsReview && !labels.includes('Ownership: Needs Review')) {
                additions.push('Ownership: Needs Review');
              }
              if (additions.length) {
                await github.rest.issues.addLabels({ ...context.repo, issue_number, labels: additions });
              }

              if (await rollbackForOverride()) return;
              labels = await getLabels();
              for (const other of teams.filter(name => name !== team && labels.includes(name))) {
                try {
                  await github.rest.issues.removeLabel({ ...context.repo, issue_number, name: other });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
                if (await rollbackForOverride()) return;
              }
              if (!needsReview && labels.includes('Ownership: Needs Review')) {
                try {
                  await github.rest.issues.removeLabel({
                    ...context.repo, issue_number, name: 'Ownership: Needs Review',
                  });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
                if (await rollbackForOverride()) return;
              }

              if (await rollbackForOverride()) return;
              const verified = await getLabels();
              if (verified.includes('Ownership: Manual')) {
                if (await rollbackForOverride()) return;
                continue;
              }
              const selected = teams.filter(name => verified.includes(name));
              if (
                selected.length === 1 &&
                selected[0] === team &&
                verified.includes('Ownership: Needs Review') === needsReview
              ) {
                core.info(`Applied and verified ${team} on attempt ${attempt}.`);
                return;
              }
              await new Promise(resolve => setTimeout(resolve, attempt * 2000));
            }
            throw new Error('Ownership labels failed exact-one verification after three attempts');

      - name: Report visible failure
        if: failure()
        run: |
          echo "### Ownership classification failed" >> "$GITHUB_STEP_SUMMARY"
          echo "No unvalidated producer result was applied. Existing team labels were preserved on validation and override failures." >> "$GITHUB_STEP_SUMMARY"
