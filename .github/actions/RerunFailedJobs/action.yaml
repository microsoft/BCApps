name: Rerun Failed Jobs
author: Microsoft Corporation
description: Analyzes failed PR build jobs for instabilities and reruns them if appropriate
inputs:
  runId:
    description: The workflow run ID of the failed run
    required: true
  repository:
    description: The repository (owner/repo)
    required: true
  token:
    description: The GitHub token for API calls
    required: true
  maxRerunAttempts:
    description: Maximum number of rerun attempts before giving up
    required: false
    default: '2'
  maxFailedJobs:
    description: Maximum number of failed jobs to analyze
    required: false
    default: '3'
runs:
  using: composite
  steps:
    - name: Rerun Failed Jobs
      shell: pwsh
      env:
        GH_TOKEN: ${{ inputs.token }}
        GITHUB_REPOSITORY: ${{ inputs.repository }}
      run: |
        ${{ github.action_path }}/action.ps1 -RunId ${{ inputs.runId }} -MaxRerunAttempts ${{ inputs.maxRerunAttempts }} -MaxFailedJobs ${{ inputs.maxFailedJobs }}
branding:
  icon: refresh-cw
  color: blue
