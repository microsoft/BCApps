# BCQuality integration config — shared by every agent in this repository
# that consumes BCQuality (the Copilot PR reviewer today; future
# code-generation, telemetry-audit, and other agents tomorrow).
#
# Single source of truth for which BCQuality content this repository
# consumes. Every value below can be overridden at workflow runtime via
# the matching Actions variable; see scripts/Get-BCQualityConfig.ps1 for
# the override map.
#
# This Microsoft-owned repo defaults to the `microsoft` layer only.
# Partners forking the orchestrator typically only need to change
# `bcquality.repo` (and optionally enable additional layers) — everything
# else is inherited.

bcquality:
  # HTTPS URL of the BCQuality repository to consume. Partners pointing at a
  # private fork or mirror should change this.
  #
  # SECURITY: the runner clones this repo and makes it the Copilot CLI working
  # directory, so its skill/knowledge files are read by the agent before it
  # sees the PR diff. Point `repo` (and the `BCQUALITY_REPO` override) ONLY at
  # a trusted source — a compromised fork can embed prompt-injection payloads
  # that manipulate review output. Pin `ref` below to a reviewed commit SHA.
  repo: https://github.com/microsoft/BCQuality

  # Git ref (branch, tag, or SHA) to clone. Pinned to a specific BCQuality
  # main commit for reproducible reviews; bump deliberately as BCQuality
  # advances (or switch to a release tag once BCQuality cuts releases).
  ref: 822cae1b2771ac25f665f73369f69093bd4fd630

# Which BCQuality layers an agent may consume during this review.
# Allowed values: microsoft, community, custom.
# This Microsoft repo defaults to microsoft only — community and custom
# rules MUST NOT influence Microsoft code reviews unless explicitly enabled.
enabled-layers:
  - microsoft

# Repo-relative paths (within BCQuality) of action skills to exclude.
# Example: 'microsoft/skills/review/al-style-review.md'
disabled-skills: []

# Per-article filtering for knowledge files. Globs are matched against
# repo-relative paths inside the BCQuality clone (forward slashes).
# Evaluation order:
#   1. If `allow` is non-empty, only files matching `allow` survive.
#   2. Files matching `deny` are then removed.
#   3. Files outside `enabled-layers` are always removed.
# The filter operates on the local clone before the agent runs, so the
# filter is deterministic and visible in workflow artifacts.
knowledge:
  allow:
    - 'microsoft/knowledge/**'
  deny: []

# Dimensions passed verbatim to BCQuality's entry.md as `task-context`.
# See https://github.com/microsoft/BCQuality/blob/main/skills/entry.md for
# the schema. Each list may be `[all]` to mean "unconstrained".
task-context:
  technologies: [al]
  countries: [w1]
  application-area: [all]
  bc-version: [all]
